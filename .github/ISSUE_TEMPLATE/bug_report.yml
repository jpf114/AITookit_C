---
name: Bug Report
about: Report a problem with AIToolkit
title: "[Bug] "
labels: bug
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug and expected behavior.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `ai_toolkit_c.exe --version`
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: Windows 10/11 x64
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
